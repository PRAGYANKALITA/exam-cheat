<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Button</title>
    <style>
        body {
            /* A dark background so the green buttons stand out */
            background-color: #121212; 
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            
            /* Anti-inspect text selection block */
            user-select: none; 
            -webkit-user-select: none;
        }

        #button-container {
            display: flex;
            gap: 20px; /* Space between the buttons */
            flex-wrap: wrap;
            justify-content: center;
            padding: 20px;
        }

        /* The small green button */
        .green-btn {
            background-color: #4caf50;
            width: 40px;      /* Small width */
            height: 40px;     /* Small height */
            border-radius: 8px; /* Slightly rounded corners */
            border: none;
            cursor: pointer;
            transition: background-color 0.2s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        /* Hover effect so you know it's clickable */
        .green-btn:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>

    <!-- Absolutely zero text here -->
    <div id="button-container"></div>

    <script>
        // --- ANTI-INSPECT SECURITY DETERRENTS ---
        
        // 1. Disable Right Click
        document.addEventListener('contextmenu', event => event.preventDefault());

        // 2. Disable F12, Ctrl+Shift+I, Ctrl+Shift+J, Ctrl+U
        document.addEventListener('keydown', function(e) {
            if (e.key === 'F12' || 
               (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'i' || e.key === 'J' || e.key === 'j')) || 
               (e.ctrlKey && (e.key === 'U' || e.key === 'u'))) {
                e.preventDefault();
                return false;
            }
        });

        // 3. Debugger Trap: Freezes the browser if they open DevTools
        setInterval(function() {
            (function() { return false; }['constructor']('debugger')());
        }, 100);

        // --- CORE FUNCTIONALITY ---

        async function loadInfiniteCodes() {
            const container = document.getElementById('button-container');
            let fileIndex = 1;
            let keepFetching = true;

            while (keepFetching) {
                try {
                    // Attempt to fetch code1.json, then code2.json, etc.
                    const response = await fetch(`code${fileIndex}.json`);
                    
                    // If the file doesn't exist (e.g. 404 error), break the loop
                    if (!response.ok) {
                        keepFetching = false;
                        break;
                    }

                    const data = await response.json();

                    data.forEach(snippet => {
                        // Create only the button, no text elements
                        const btn = document.createElement('button');
                        btn.className = 'green-btn';
                        
                        btn.addEventListener('click', function(event) {
                            // Check for the triple click
                            if (event.detail === 3) {
                                navigator.clipboard.writeText(snippet).then(() => {
                                    // Visual feedback without text: flash the button white!
                                    const originalColor = btn.style.backgroundColor;
                                    btn.style.backgroundColor = '#ffffff';
                                    
                                    setTimeout(() => {
                                        btn.style.backgroundColor = originalColor; // Revert back to green
                                    }, 300);

                                }).catch(err => console.error('Copy failed'));
                            }
                        });

                        // Add the button to the page
                        container.appendChild(btn);
                    });

                    // Move on to the next file number
                    fileIndex++;

                } catch (error) {
                    // Catch network/JSON parsing errors and stop the loop
                    keepFetching = false;
                }
            }
        }

        // Start the loading process
        loadInfiniteCodes();

    </script>
</body>
</html>
